<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🩷</text></svg>" />
  <title>Engagement Invitation-Andre & Ivana</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #video {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }

    @media (min-aspect-ratio: 9/16) {
      #video { width: auto; height: 100vh; }
    }

    /* ── Tap layer ── */
    #tap-layer {
      position: fixed;
      inset: 0;
      z-index: 10;
      cursor: pointer;
    }

    /* ── Sound hint — pojok kiri bawah ── */
    #sound-hint {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      border-radius: 100px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      pointer-events: none;
      animation: fadeInUp 1s ease 0.8s both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    #sound-hint.hidden {
      animation: fadeOut 0.4s ease forwards;
    }

    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(-50%) translateY(6px); }
    }

    /* Animated sound bars */
    .bars {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 16px;
    }

    .bar {
      width: 3px;
      border-radius: 2px;
      background: white;
      animation: bounce 1.1s ease-in-out infinite;
      transform-origin: bottom;
    }

    .bar:nth-child(1) { height: 6px;  animation-delay: 0s; }
    .bar:nth-child(2) { height: 12px; animation-delay: 0.15s; }
    .bar:nth-child(3) { height: 9px;  animation-delay: 0.3s; }
    .bar:nth-child(4) { height: 14px; animation-delay: 0.1s; }
    .bar:nth-child(5) { height: 7px;  animation-delay: 0.25s; }

    @keyframes bounce {
      0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
      50%       { transform: scaleY(1);   opacity: 1; }
    }

    .hint-text {
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    /* ── No-video fallback ── */
    #no-video {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      background: #000;
      color: rgba(255,255,255,0.55);
      text-align: center;
      padding: 40px;
      font-family: sans-serif;
    }
    #no-video h2 { color: #fff; font-size: 18px; font-weight: 400; }
    #no-video code {
      background: rgba(255,255,255,0.08);
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 13px;
      color: #999;
    }
  </style>
</head>
<body>

  <div id="stage">
    <video
      id="video"
      playsinline
      webkit-playsinline
      preload="auto"
      loop
      muted
    >
      <source src=./public/engagement.MOV type="video/mp4" />
    </video>
  </div>

  <div id="tap-layer"></div>

  <!-- Sound hint -->
  <div id="sound-hint">
    <div class="bars">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
    <span class="hint-text">Tap untuk suara</span>
  </div>

  <div id="no-video">
    <h2>Video tidak ditemukan</h2>
    <p>Taruh file video di folder <code>public/</code> dengan nama <code>invitation.mp4</code></p>
  </div>

  <script>
    const video     = document.getElementById('video');
    const tapLayer  = document.getElementById('tap-layer');
    const soundHint = document.getElementById('sound-hint');
    const noVideo   = document.getElementById('no-video');

    video.muted = true;
    video.play().catch(() => {});

    function unlockAudio() {
      video.muted = false;
      video.play().catch(() => { video.muted = true; });
      tapLayer.remove();
      soundHint.classList.add('hidden');
      setTimeout(() => soundHint.remove(), 400);
    }

    tapLayer.addEventListener('click',    unlockAudio, { once: true });
    tapLayer.addEventListener('touchend', unlockAudio, { once: true, passive: true });

    video.addEventListener('error', () => {
      noVideo.style.display = 'flex';
    });
  </script>
</body>
</html>
